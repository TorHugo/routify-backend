name: RoutifyApp Build and Deploy

on:
  push:
    branches:
      - develop
    paths-ignore:
      - '.gitignore'

jobs:

  discord-notification-start:
    runs-on: ubuntu-latest
    environment: routify-app

    steps:
      - name: Discord Notification Start
        uses: sarisia/actions-status-discord@v1.9.0
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "[start] routify deployment"
          description: "📌 Starting the deployment and build of the Routify Backend API."
          username: GitHub Actions

  build:
    needs: discord-notification-start
    runs-on: ubuntu-latest
    environment: routify-app
    outputs:
      jar_path: ${{ steps.save_jar.outputs.jar_path }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'adopt'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: bootJar
          gradle-home-cache-cleanup: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

      - name: Save JAR path
        id: save_jar
        run: echo "jar_path=$(find build/libs -name '*.jar' -type f)" >> $GITHUB_OUTPUT

  build-docker-and-deploy-ecr:
    needs: build
    runs-on: ubuntu-latest
    environment: routify-app

    steps:
      - uses: actions/checkout@v3

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ECR_URL }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_NAME }}
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-to-ec2:
    needs: build-docker-and-deploy-ecr
    runs-on: ubuntu-latest
    environment: routify-app

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update

      - name: Deploy to EC2 with ECR authentication
        run: |
          ### Stop current container ###
          aws ssm send-command \
            --instance-ids "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["docker stop routify_backend_app || true", "docker rm routify_backend_app || true"]}' \
            --output text
          
          ### Update docker-compose.yml ###
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          ESCAPED_COMMAND="sed -i '/backend:/,/image:/s|image: .*|image: ${{ secrets.AWS_ECR_URL }}/${{ secrets.AWS_ECR_NAME }}:${IMAGE_TAG}|' /home/routify/ec2/docker-compose.yml"
          aws ssm send-command \
            --instance-ids "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[\"$ESCAPED_COMMAND\"]}" \
            --output text

          ### Adicionar autenticação ECR antes de iniciar containers ###
          aws ssm send-command \
            --instance-ids "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_URL }}"]}' \
            --output text

          ### Start new container ###
          aws ssm send-command \
            --instance-ids "${{ secrets.AWS_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /home/routify/ec2 && docker-compose up -d"]}' \
            --output text

  validation-health-check:
    needs: deploy-to-ec2
    runs-on: ubuntu-latest
    environment: routify-app

    steps:
      - name: Wait for application startup
        run: sleep 30

      - name: Execute health check
        id: health_check
        run: |
          HEALTH_URL="${{ secrets.API_BASE_URL }}/health"
          MAX_RETRIES=3
          RETRY_INTERVAL=10
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES..."
          
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $HEALTH_URL)
          
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Health check succeeded!"
              exit 0
            fi
          
            echo "Health check returned status $HTTP_STATUS, waiting $RETRY_INTERVAL seconds before retry..."
          
            if [ $i -lt $MAX_RETRIES ]; then
              sleep $RETRY_INTERVAL
            fi
          done
          
          echo "Health check failed after $MAX_RETRIES attempts."
          exit 1

      - name: Discord Notification Health Check Success
        uses: sarisia/actions-status-discord@v1.9.0
        if: success()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "[health check passed] routify deployment"
          description: "✅ Health check passed successfully! Routify API is up and running."
          color: 0x00ff00
          username: GitHub Actions

  discord-notification-error:
    needs: [discord-notification-start, build, build-docker-and-deploy-ecr, deploy-to-ec2, validation-health-check]
    if: failure()
    runs-on: ubuntu-latest
    environment: routify-app

    steps:
      - name: Discord Notification Error
        uses: sarisia/actions-status-discord@v1.9.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "[ERROR] routify deployment failed"
          description: "❌ The deployment of Routify Backend API failed. Please check GitHub Actions logs."
          color: 0xff0000
          username: GitHub Actions