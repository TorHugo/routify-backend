name: RoutifyApp Build and Deploy

on:
  push:
    branches:
      - develop
    paths-ignore:
      - '.gitignore'

jobs:

  discord-notification-start:
    runs-on: ubuntu-latest
    environment: routify-app

    steps:
      - name: Discord Notification Start
        uses: sarisia/actions-status-discord@v1.9.0
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "[start] routify deployment"
          description: "Starting the deployment and build of the Routify Backend API."
          username: GitHub Actions

  build:
    needs: discord-notification-start
    runs-on: ubuntu-latest
    environment: routify-app
    outputs:
      jar_path: ${{ steps.save_jar.outputs.jar_path }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'adopt'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: bootJar
          gradle-home-cache-cleanup: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

      - name: Save JAR path
        id: save_jar
        run: echo "jar_path=$(find build/libs -name '*.jar' -type f)" >> $GITHUB_OUTPUT

  build-docker-and-deploy-ecr:
    needs: build
    runs-on: ubuntu-latest
    environment: routify-app

    steps:
      - uses: actions/checkout@v3

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ECR_URL }}
          ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY_NAME }}
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG



  discord-notification-done:
    needs: build-docker-and-deploy-ecr
    runs-on: ubuntu-latest
    environment: routify-app

    steps:
      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1.9.0
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "[done] routify deployment"
          description: "Done with successfully the deployment and build of the Routify Backend API."
          username: GitHub Actions