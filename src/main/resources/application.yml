server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: routify-backend-api

  messages:
    basename: messages
    encoding: UTF-8

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${ROUTIFY_MAIL_USERNAME}
    password: ${ROUTIFY_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp
        debug: true  # Útil para debug, pode remover em produção

  datasource:
    url: jdbc:postgresql://${DB_URI:localhost}:${DB_PORT:5432}/postgres
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        default_schema: routify_db
    open-in-view: false
